name: continuous integration

on:
  - pull_request
  - push
  - workflow_dispatch

jobs:
  normal:
    runs-on: ubuntu-latest
    steps:
      - name: check out Freeciv-web
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache Freeciv build
        uses: actions/cache@v4
        with:
          path: |
            freeciv/build
            ~/freeciv
          key: ${{ runner.os }}-freeciv-${{ hashFiles('freeciv/prepare_freeciv.sh', 'freeciv/version.txt') }}
          restore-keys: |
            ${{ runner.os }}-freeciv-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            freeciv-web/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set JAVA_HOME environment variables
        run: |
          echo "JAVA_HOME is $JAVA_HOME"
          java -version 

      - name: prepare
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          # Remove databases in parallel
          (sudo apt-get remove -y ^postgresql 'mysql.*' || true) &
          (sudo rm -rf /var/lib/mysql || true) &
          wait

      - name: install
        shell: bash
        run: bash ./scripts/install/install.sh --mode=TEST_MYSQL
        env:
          SKIP_MINIFY: "true"
        
        
      - name: Run Playwright tests
        run: |
          java -version 
          cd freeciv-web
          # Install Playwright with cache check
          if [ ! -d "node_modules/@playwright/test" ]; then
            npm install @playwright/test --save-dev
          fi
          # Install browsers only if not cached
          if [ ! -d "$HOME/.cache/ms-playwright" ] || [ -z "$(ls -A $HOME/.cache/ms-playwright)" ]; then
            npx playwright install
          fi
          npx playwright test tests/playwright/freeciv-web.test.js
        



