<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Tile Visualization Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }
        #container {
            width: 100%;
            height: 600px;
            border: 2px solid #444;
            background: #000;
        }
        #controls {
            margin-bottom: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        button.secondary {
            background: #2196F3;
        }
        button.secondary:hover {
            background: #0b7dda;
        }
        select, input[type="number"] {
            padding: 5px;
            font-size: 14px;
        }
        #info {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        .info-line {
            margin: 5px 0;
        }
        h1 {
            margin-top: 0;
            color: #4CAF50;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <h1>🎮 Hex Tile Visualization Test</h1>
    
    <div id="controls">
        <div class="control-group">
            <label>Topology:</label>
            <select id="topology">
                <option value="square">Square Tiles</option>
                <option value="hex" selected>Hexagonal Tiles</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Map Size:</label>
            <input type="number" id="mapWidth" value="10" min="3" max="20">
            x
            <input type="number" id="mapHeight" value="8" min="3" max="20">
        </div>
        
        <div class="control-group">
            <label>Tile Size:</label>
            <input type="number" id="tileSize" value="35.71" min="10" max="100" step="0.1">
        </div>
        
        <div class="control-group">
            <button onclick="generateMap()">Generate Map</button>
            <button class="secondary" onclick="toggleGrid()">Toggle Grid</button>
            <button class="secondary" onclick="randomColors()">Random Colors</button>
            <button class="secondary" onclick="resetCamera()">Reset Camera</button>
        </div>
    </div>
    
    <div id="container"></div>
    
    <div id="info">
        <div class="info-line"><strong>Instructions:</strong></div>
        <div class="info-line">• Click and drag to rotate view</div>
        <div class="info-line">• Scroll to zoom in/out</div>
        <div class="info-line">• Click on tiles to select them</div>
        <div class="info-line" id="status">Status: Ready</div>
        <div class="info-line" id="topology-info"></div>
        <div class="info-line" id="tile-info"></div>
    </div>

    <script>
        // Global variables
        let scene, camera, renderer, controls;
        let tileGroup;
        let TILE_SIZE = 35.71;
        let isHex = true;
        let showGrid = true;
        let mapWidth = 10;
        let mapHeight = 8;
        let tileMeshes = [];
        let raycaster, mouse;
        let selectedTile = null;
        
        // Initialize the scene
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Camera
            const container = document.getElementById('container');
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                1,
                10000
            );
            camera.position.set(200, 300, 300);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(100, 200, 100);
            scene.add(directionalLight);
            
            // Raycaster for mouse picking
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // Simple orbit controls
            container.addEventListener('mousedown', onMouseDown);
            container.addEventListener('mousemove', onMouseMove);
            container.addEventListener('wheel', onMouseWheel);
            container.addEventListener('click', onMouseClick);
            
            // Generate initial map
            generateMap();
            
            // Animation loop
            animate();
            
            updateInfo();
        }
        
        // Generate hex tile geometry
        function createHexGeometry(x, y, height) {
            const hex_width = TILE_SIZE * Math.sqrt(3);
            const hex_height = TILE_SIZE * 2;
            
            let centerX = x * hex_width;
            if (y % 2 === 1) {
                centerX += hex_width / 2;
            }
            let centerZ = y * hex_height * 0.75;
            
            const width_half = (mapWidth * hex_width) / 2;
            const height_half = (mapHeight * hex_height * 0.75) / 2;
            
            centerX -= width_half;
            centerZ -= height_half;
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];
            
            // Center
            vertices.push(centerX, height, centerZ);
            
            // 6 corners
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i - Math.PI / 2;
                vertices.push(
                    centerX + TILE_SIZE * Math.cos(angle),
                    height,
                    centerZ + TILE_SIZE * Math.sin(angle)
                );
                
                const nextIdx = (i + 1) % 6 + 1;
                indices.push(0, i + 1, nextIdx);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            return geometry;
        }
        
        // Generate square tile geometry
        function createSquareGeometry(x, y, height) {
            const tileX = x * TILE_SIZE;
            const tileZ = y * TILE_SIZE;
            
            const width_half = (mapWidth * TILE_SIZE) / 2;
            const height_half = (mapHeight * TILE_SIZE) / 2;
            
            const geometry = new THREE.BufferGeometry();
            const halfSize = TILE_SIZE / 2;
            
            const vertices = [
                tileX - halfSize - width_half, height, tileZ - halfSize - height_half,
                tileX + halfSize - width_half, height, tileZ - halfSize - height_half,
                tileX + halfSize - width_half, height, tileZ + halfSize - height_half,
                tileX - halfSize - width_half, height, tileZ + halfSize - height_half
            ];
            
            const indices = [0, 1, 2, 0, 2, 3];
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            return geometry;
        }
        
        // Generate map
        function generateMap() {
            // Clean up old tiles
            if (tileGroup) {
                scene.remove(tileGroup);
            }
            tileMeshes = [];
            
            tileGroup = new THREE.Group();
            
            mapWidth = parseInt(document.getElementById('mapWidth').value);
            mapHeight = parseInt(document.getElementById('mapHeight').value);
            TILE_SIZE = parseFloat(document.getElementById('tileSize').value);
            isHex = document.getElementById('topology').value === 'hex';
            
            // Generate tiles
            for (let y = 0; y < mapHeight; y++) {
                for (let x = 0; x < mapWidth; x++) {
                    const height = Math.random() * 20;
                    const geometry = isHex ? 
                        createHexGeometry(x, y, height) : 
                        createSquareGeometry(x, y, height);
                    
                    const color = getTerrainColor(x, y);
                    const material = new THREE.MeshLambertMaterial({
                        color: color,
                        side: THREE.DoubleSide
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.userData = { x: x, y: y, isHex: isHex };
                    
                    // Add wireframe if grid enabled
                    if (showGrid) {
                        const wireframe = new THREE.LineSegments(
                            new THREE.EdgesGeometry(geometry),
                            new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 })
                        );
                        mesh.add(wireframe);
                    }
                    
                    tileGroup.add(mesh);
                    tileMeshes.push(mesh);
                }
            }
            
            scene.add(tileGroup);
            
            document.getElementById('status').textContent = 
                `Status: Generated ${mapWidth}x${mapHeight} ${isHex ? 'hexagonal' : 'square'} tiles`;
            updateInfo();
        }
        
        // Get terrain color based on position
        function getTerrainColor(x, y) {
            const colors = [
                0x228b22, // Forest green
                0x7cfc00, // Grassland
                0x9acd32, // Plains
                0x8b7355, // Hills
                0xf4a460, // Desert
                0x4169e1  // Coast
            ];
            return colors[(x + y) % colors.length];
        }
        
        // Toggle grid
        function toggleGrid() {
            showGrid = !showGrid;
            generateMap();
        }
        
        // Random colors
        function randomColors() {
            tileMeshes.forEach(mesh => {
                mesh.material.color.setHex(Math.random() * 0xffffff);
            });
        }
        
        // Reset camera
        function resetCamera() {
            camera.position.set(200, 300, 300);
            camera.lookAt(0, 0, 0);
        }
        
        // Mouse interaction
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        
        function onMouseDown(event) {
            isDragging = true;
            previousMouseX = event.clientX;
            previousMouseY = event.clientY;
        }
        
        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMouseX;
                const deltaY = event.clientY - previousMouseY;
                
                tileGroup.rotation.y += deltaX * 0.01;
                tileGroup.rotation.x += deltaY * 0.01;
                
                previousMouseX = event.clientX;
                previousMouseY = event.clientY;
            }
        }
        
        function onMouseWheel(event) {
            event.preventDefault();
            camera.position.z += event.deltaY * 0.1;
        }
        
        function onMouseClick(event) {
            const container = document.getElementById('container');
            const rect = container.getBoundingClientRect();
            
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tileMeshes);
            
            if (intersects.length > 0) {
                const tile = intersects[0].object;
                
                // Reset previous selection
                if (selectedTile) {
                    selectedTile.material.emissive.setHex(0x000000);
                }
                
                // Highlight new selection
                tile.material.emissive.setHex(0xff0000);
                selectedTile = tile;
                
                document.getElementById('tile-info').textContent = 
                    `Selected Tile: (${tile.userData.x}, ${tile.userData.y}) - ${tile.userData.isHex ? 'Hexagonal' : 'Square'}`;
            }
        }
        
        window.addEventListener('mouseup', () => { isDragging = false; });
        
        // Update info display
        function updateInfo() {
            const topology = document.getElementById('topology').value;
            const hex_width = TILE_SIZE * Math.sqrt(3);
            const hex_height = TILE_SIZE * 2;
            
            document.getElementById('topology-info').innerHTML = 
                `<strong>Topology:</strong> ${topology === 'hex' ? 'Hexagonal' : 'Square'}<br>` +
                (topology === 'hex' ? 
                    `Hex Width: ${hex_width.toFixed(2)}, Hex Height: ${hex_height.toFixed(2)}, Spacing: ${(hex_height * 0.75).toFixed(2)}` :
                    `Tile Size: ${TILE_SIZE}`);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
