================================================================================
  FREECIV-WEB STANDALONE 3D TESTING ENVIRONMENT
================================================================================

PURPOSE:
--------
This HTML file provides a complete standalone testing environment for the
Freeciv-web 3D WebGL renderer WITHOUT requiring:
  - A running Tomcat server
  - A Freeciv C server backend
  - Network connectivity
  - Full game logic

It enables rapid development, testing, and validation of 3D rendering features
in isolation.

ARCHITECTURE OVERVIEW:
---------------------
1. **Three.js Module Loading** (ES6 imports)
   - Loads Three.js r182 and related libraries (GLTFLoader, OrbitControls, etc.)
   - Uses import maps for modern module resolution
   - Exposes modules to window scope for compatibility with legacy code

2. **Mock Environment Setup**
   - Sets STANDALONE_MODE = true flag (checked throughout codebase)
   - Defines game state constants (C_S_INITIAL, C_S_RUNNING, etc.)
   - Defines quality settings (QUALITY_MEDIUM, QUALITY_HIGH)
   - Provides minimal jQuery mock for compatibility

3. **Mock Server Functions** (standalone/mock-server.js)
   - Stubs network communication functions
   - Mocks missing global variables and functions
   - Prevents errors from server-dependent code

4. **Core Freeciv-web JavaScript** (ordered loading)
   - fc_types.js: Type definitions and constants
   - map.js, tile.js, terrain.js: Map data structures
   - player.js, nation.js, game.js: Game state
   - city.js, unit.js: Game entities
   - control.js: Game control functions

5. **WebGL Rendering Stack** (3D engine)
   - renderer_init.js: WebGL initialization
   - preload.js: Asset loading (textures, models)
   - mapview_webgl.js: Main 3D rendering engine
   - heightmap_square.js: Terrain height generation
   - camera_square.js: Camera positioning and controls
   - sprites.js, city.js: 3D object creation
   - object_position_handler_square.js: Object positioning

6. **Standalone Testing Modules**
   - mock-data.js: Generates test map, cities, units, players
   - renderer-bootstrap.js: Initializes 3D renderer without server
   - test-scenarios.js: Defines multiple test cases
   - screenshot-capture.js: Captures rendered frames for validation
   - test-runner.js: Automates test execution

INITIALIZATION FLOW:
-------------------
1. Page loads → Three.js modules imported
2. STANDALONE_MODE flag set → Mock jQuery created
3. Mock server functions loaded → Prevents errors
4. Core JavaScript loaded → Data structures available
5. WebGL modules loaded → Rendering functions defined
6. Standalone modules loaded → Testing infrastructure ready
7. window.load event fires → init_standalone_environment() called
8. Mock data initialized → Map, cities, units created
9. webgl_preload() called → Textures/models loaded (3 sec wait)
10. bootstrap_standalone_renderer() called:
    - init_webgl_renderer(): Creates WebGL context
    - webgl_start_renderer(): Sets up Three.js scene
    - init_webgl_mapview(): Generates terrain mesh
    - position_camera_for_standalone(): Centers camera on map
    - start_standalone_render_loop(): Begins animation
11. Loading overlay hidden → User sees 3D map

KEY FEATURES:
------------
- **3D Terrain Rendering**: Generated mesh from heightmap data
- **Camera Controls**: Mouse rotation, zoom, pan (OrbitControls)
- **Test Scenarios**: 5+ predefined scenarios (varied terrain, cities, units)
- **Screenshot Capture**: Save rendered frames for validation
- **Test Runner**: Automated scenario execution
- **No Dependencies**: Works offline, no server required

USAGE:
------
1. Start a simple HTTP server:
   cd freeciv-web/src/main/webapp
   python3 -m http.server 8080

2. Open in browser:
   http://localhost:8080/freeciv-web-standalone.html

3. Wait 5-10 seconds for initialization

4. Interact with 3D map:
   - Left mouse: Rotate view
   - Right mouse: Pan view
   - Scroll wheel: Zoom in/out

5. Use test controls (appear after loading):
   - Top-left: Test runner controls
   - Top-right: Screenshot controls

TESTING:
--------
- Manual: Open in browser and interact
- Automated: npm run test (Playwright tests)
- CI/CD: Runs in headless mode for validation

GLOBAL VARIABLES PROVIDED:
--------------------------
- STANDALONE_MODE: Boolean flag (true in this environment)
- scene, camera, maprenderer: Three.js objects
- controls: OrbitControls instance
- map, tiles, terrains: Map data structures
- cities, units, players, nations: Game entities
- graphics_quality, terrain_quality: Rendering settings
- mapview_model_width, mapview_model_height: Scene dimensions (1000x1000)

DEBUGGING:
----------
- Open browser console (F12) for detailed logs
- Check initialization steps in console
- Verify mock data: console.log(map, tiles, cities)
- Inspect Three.js objects: console.log(scene, camera)
- Check for errors in Network tab (missing assets)

<!-- ============================================================================
     STANDALONE MODE CONFIGURATION
     ============================================================================
     Sets up the standalone environment with mocks and constants.
     STANDALONE_MODE flag is checked throughout the codebase to enable
     standalone-specific behavior (skipping network calls, using mocks, etc.)
     ============================================================================ -->

<script type="text/javascript">
// *** STANDALONE MODE FLAG ***
// This flag is checked throughout Freeciv-web code to enable standalone behavior
// When true: Skip network init, use mock data, disable server-dependent features
var STANDALONE_MODE = true;
console.log("=== Freeciv-web Standalone Mode ===");

// *** GAME STATE CONSTANTS ***
// Client state constants (normally from fc_types.js or server)
// Used to track game initialization state
var C_S_INITIAL = 0;     // Initial state
var C_S_PREPARING = 1;   // Preparing to start
var C_S_RUNNING = 5;     // Game is running
var C_S_OVER = 6;        // Game is over

// *** GRAPHICS QUALITY SETTINGS ***
// Quality presets for rendering (affects detail level, performance)
var QUALITY_MEDIUM = 2;
var QUALITY_HIGH = 3;

// *** JQUERY MOCK ***
// Minimal jQuery implementation for compatibility with legacy code
// Freeciv-web uses jQuery extensively, but we don't need full library for standalone
if (typeof $ === 'undefined') {
  // Basic selector function (mimics jQuery $())
  window.$ = function(selector) {
    // Handle window/document selectors for width/height queries
    if (selector === window || selector === document) {
      return {
        width: function() { return window.innerWidth; },
        height: function() { return window.innerHeight; }
      };
    }
    // Handle DOM element selectors
    var elem = typeof selector === 'string' ? document.querySelector(selector) : selector;
    return {
      html: function(html) {
        if (arguments.length === 0) {
          return elem ? elem.innerHTML : '';
        }
        if (elem) elem.innerHTML = html;
        return this;
      },
      fadeIn: function() { return this; },
      fadeOut: function() { return this; },
      hide: function() { return this; },
      show: function() { return this; }
    };
  };
  
  // Mock blocking UI functions (used during loading)
  $.blockUI = function() { console.log("$.blockUI()"); };
  $.unblockUI = function() { 
    console.log("$.unblockUI()");
    // Hide loading overlay when unblocking
    var overlay = document.getElementById('loading-overlay');
    if (overlay) {
      overlay.style.display = 'none';
    }
  };
  
  // Mock $.extend for object merging (used by utility.js)
  // Merges properties from source objects into target object
  $.extend = function() {
    var target = arguments[0] || {};
    for (var i = 1; i < arguments.length; i++) {
      var source = arguments[i];
      if (source != null) {
        for (var key in source) {
          if (source.hasOwnProperty(key)) {
            target[key] = source[key];
          }
        }
      }
    }
    return target;
  };
}
</script>

<script type="text/javascript">
// *** LOADING PROGRESS INDICATOR ***
// Updates the visual loading bar and message
function update_loading_progress(percent, message) {
// *** LOADING PROGRESS INDICATOR ***
// Updates the visual loading bar and message
function update_loading_progress(percent, message) {
  var bar = document.getElementById('loading-bar');
  var msg = document.getElementById('loading-message');
  if (bar) bar.style.width = percent + '%';
  if (msg) msg.textContent = message;
}

// *** MAIN INITIALIZATION ***
// Called when page finishes loading (all scripts downloaded)
// Triggers the standalone environment initialization sequence
window.addEventListener('load', function() {
  console.log("Page loaded, initializing standalone environment...");
  update_loading_progress(50, "Initializing...");
  
  // Small delay to ensure DOM is ready
  setTimeout(function() {
    try {
      // Start initialization (defined in renderer-bootstrap.js)
      init_standalone_environment();
      update_loading_progress(100, "Complete!");
    } catch (e) {
      console.error("Initialization error:", e);
      alert("Error initializing: " + e.message);
    }
  }, 100);
});

// *** WINDOW RESIZE HANDLER ***
// Updates camera and renderer when browser window is resized
// Maintains correct aspect ratio and rendering quality
window.addEventListener('resize', function() {
  // Update camera aspect ratio
  if (typeof camera !== 'undefined' && camera) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  // Update renderer size
  if (typeof maprenderer !== 'undefined' && maprenderer) {
    maprenderer.setSize(window.innerWidth, window.innerHeight);
  }
});

console.log("Standalone HTML initialized");
</script>
