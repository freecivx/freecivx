# Spring Boot Configuration for Freeciv-web
spring.application.name=freeciv-web

# Server Configuration
server.port=8080
server.servlet.context-path=/

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:freecivdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL Configuration (uncomment for production)
#spring.datasource.url=jdbc:mysql://localhost:3306/freeciv_web
#spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Application-specific Configuration
savegame.dir=/var/lib/tomcat11/webapps/data/savegames/

# Logging
logging.level.org.freeciv=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=DEBUG

# Servlet Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
